services:
  - type: web
    name: nagrikos-api
    env: python
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nagrikos-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://nagrik-os.vercel.app,http://localhost:5173,http://localhost:3000"
      - key: AI_API_KEY
        sync: false

databases:
  - name: nagrikos-db
    plan: free
    databaseName: nagrikos
